<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معاملاتي</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* شاشة الترحيب */
.bg {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(-45deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    z-index: 9999;
}

.logo {
    font-size: 40px;
    margin-bottom: 10px;
}

.title {
    font-size: 28px;
    font-weight: bold;
}

.subtitle {
    margin-top: 5px;
    font-size: 16px;
    opacity: 0.8;
}

/* اللودر */
.loader {
    margin-top: 20px;
}

.loader span {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    margin: 3px;
    animation: bounce 1.4s infinite;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* محتوى التطبيق */
#mainApp {
    display: none;
    padding: 20px;
}
</style>

</head>

<body>

<!-- شاشة الترحيب -->
<div id="welcomeScreen" class="bg">
    <div class="logo">📱</div>
    <div class="title">معاملاتي</div>
    <div class="subtitle">معاملاتك خطوة بخطوة</div>

    <div class="loader">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<!-- التطبيق -->
<div id="mainApp">
    <h2>أهلاً بيك داخل التطبيق 👋</h2>
    <p>هنا تبدي تضيف باقي الصفحات مالتك</p>
</div>

<script>
setTimeout(function() {
    document.getElementById("welcomeScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
}, 2000);
</script>

</body>
</html>
